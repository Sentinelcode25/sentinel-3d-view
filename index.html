<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Sentinel 3D View</title>

  <script src="https://cesium.com/downloads/cesiumjs/releases/1.120/Build/Cesium/Cesium.js"></script>
  <link
    href="https://cesium.com/downloads/cesiumjs/releases/1.120/Build/Cesium/Widgets/widgets.css"
    rel="stylesheet"
  />

  <style>
    html, body, #cesiumContainer {
      width: 100%;
      height: 100%;
      margin: 0;
      padding: 0;
      overflow: hidden;
      font-family: Arial, sans-serif;
    }

    .cesium-viewer-toolbar {
      top: 10px;
      right: 10px;
    }

    #loadingOverlay {
      position: absolute;
      top: 12px;
      left: 12px;
      z-index: 999;
      background: rgba(20, 20, 20, 0.88);
      color: #fff;
      padding: 10px 14px;
      border-radius: 8px;
      font-size: 14px;
    }

    #loadingOverlay.hidden {
      display: none;
    }

    #toolbarPanel {
      position: absolute;
      top: 56px;
      left: 12px;
      z-index: 999;
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      background: rgba(20, 20, 20, 0.88);
      padding: 10px;
      border-radius: 10px;
    }

    #toolbarPanel button {
      background: #1f1f1f;
      color: #fff;
      border: 1px solid #444;
      border-radius: 6px;
      padding: 8px 10px;
      cursor: pointer;
      font-size: 13px;
    }

    #toolbarPanel button:hover {
      background: #2b2b2b;
    }

    #toolbarPanel button.active {
      background: #b00020;
      border-color: #d63a55;
    }

    #infoPanel {
      position: absolute;
      bottom: 16px;
      left: 12px;
      z-index: 999;
      width: 320px;
      max-width: calc(100vw - 24px);
      background: rgba(20, 20, 20, 0.92);
      color: #fff;
      padding: 14px;
      border-radius: 10px;
      display: none;
      box-shadow: 0 6px 20px rgba(0,0,0,0.35);
    }

    #infoPanel h3 {
      margin: 0 0 8px 0;
      font-size: 16px;
    }

    #infoPanel p {
      margin: 4px 0;
      font-size: 13px;
      line-height: 1.4;
    }

    #measurePanel {
      position: absolute;
      top: 120px;
      left: 12px;
      z-index: 999;
      background: rgba(20, 20, 20, 0.92);
      color: #fff;
      padding: 10px 12px;
      border-radius: 10px;
      font-size: 13px;
      min-width: 220px;
    }

    #measurePanel strong {
      display: block;
      margin-bottom: 6px;
    }
  </style>
</head>
<body>
  <div id="cesiumContainer"></div>

  <div id="loadingOverlay">Loading Sentinel 3D view...</div>

  <div id="toolbarPanel">
    <button id="btnHome">Home</button>
    <button id="btnMeasure">Measure: Off</button>
    <button id="btnClearMeasure">Clear Measure</button>
    <button id="btnHideInfo">Hide Info</button>
  </div>

  <div id="measurePanel">
    <strong>Measurement</strong>
    <div id="measureStatus">Mode: Off</div>
    <div id="measureResult">Distance: -</div>
  </div>

  <div id="infoPanel">
    <h3 id="infoTitle">Asset</h3>
    <p><strong>Tag:</strong> <span id="infoTag">-</span></p>
    <p><strong>Type:</strong> <span id="infoType">-</span></p>
    <p><strong>Zone:</strong> <span id="infoZone">-</span></p>
    <p><strong>Status:</strong> <span id="infoStatus">-</span></p>
    <p><strong>Notes:</strong> <span id="infoNotes">-</span></p>
  </div>

  <script type="module">
    Cesium.Ion.defaultAccessToken = "YOUR_NEW_TOKEN_HERE";

    const loadingOverlay = document.getElementById("loadingOverlay");
    const infoPanel = document.getElementById("infoPanel");
    const infoTitle = document.getElementById("infoTitle");
    const infoTag = document.getElementById("infoTag");
    const infoType = document.getElementById("infoType");
    const infoZone = document.getElementById("infoZone");
    const infoStatus = document.getElementById("infoStatus");
    const infoNotes = document.getElementById("infoNotes");

    const btnHome = document.getElementById("btnHome");
    const btnMeasure = document.getElementById("btnMeasure");
    const btnClearMeasure = document.getElementById("btnClearMeasure");
    const btnHideInfo = document.getElementById("btnHideInfo");

    const measureStatus = document.getElementById("measureStatus");
    const measureResult = document.getElementById("measureResult");

    const viewer = new Cesium.Viewer("cesiumContainer", {
      animation: false,
      timeline: false,
      baseLayerPicker: true,
      geocoder: true,
      homeButton: false,
      sceneModePicker: false,
      navigationHelpButton: false,
      fullscreenButton: true,
      infoBox: false,
      selectionIndicator: false,
      terrain: Cesium.Terrain.fromWorldTerrain(),
    });

    viewer.scene.screenSpaceCameraController.enableCollisionDetection = true;
    viewer.scene.globe.depthTestAgainstTerrain = true;
    viewer.scene.screenSpaceCameraController.minimumZoomDistance = 5;
    viewer.scene.screenSpaceCameraController.maximumZoomDistance = 5000;
    viewer.resolutionScale = Math.min(window.devicePixelRatio || 1, 2);

    const homeView = {
      destination: Cesium.Cartesian3.fromDegrees(151.3430, -33.4237, 700),
      orientation: {
        heading: Cesium.Math.toRadians(15),
        pitch: Cesium.Math.toRadians(-35),
        roll: 0
      }
    };

    const assetPins = [
      {
        id: "A001",
        name: "Main Switchroom",
        tag: "SWBD-01",
        type: "Electrical Building",
        zone: "Non-Ex",
        status: "Active",
        notes: "Primary site electrical distribution.",
        longitude: 151.3434,
        latitude: -33.4239,
        height: 8
      },
      {
        id: "A002",
        name: "Dust Collector",
        tag: "DC-201",
        type: "Process Equipment",
        zone: "Zone 22",
        status: "Inspect",
        notes: "Review ignition source controls.",
        longitude: 151.3440,
        latitude: -33.4238,
        height: 12
      },
      {
        id: "A003",
        name: "Workshop Entry",
        tag: "GATE-01",
        type: "Access Point",
        zone: "Non-Ex",
        status: "Active",
        notes: "Main personnel access point.",
        longitude: 151.3427,
        latitude: -33.4241,
        height: 4
      }
    ];

    let measureMode = false;
    let measurePoints = [];
    let measureEntities = [];

    function showAssetInfo(asset) {
      infoTitle.textContent = asset.name || "-";
      infoTag.textContent = asset.tag || "-";
      infoType.textContent = asset.type || "-";
      infoZone.textContent = asset.zone || "-";
      infoStatus.textContent = asset.status || "-";
      infoNotes.textContent = asset.notes || "-";
      infoPanel.style.display = "block";
    }

    function hideAssetInfo() {
      infoPanel.style.display = "none";
    }

    function formatDistance(meters) {
      if (meters >= 1000) {
        return (meters / 1000).toFixed(3) + " km";
      }
      return meters.toFixed(2) + " m";
    }

    function clearMeasurement() {
      measurePoints = [];
      for (const entity of measureEntities) {
        viewer.entities.remove(entity);
      }
      measureEntities = [];
      measureResult.textContent = "Distance: -";
    }

    function updateMeasureModeUI() {
      btnMeasure.textContent = measureMode ? "Measure: On" : "Measure: Off";
      btnMeasure.classList.toggle("active", measureMode);
      measureStatus.textContent = "Mode: " + (measureMode ? "On" : "Off");
    }

    function addAssetPins() {
      for (const asset of assetPins) {
        const entity = viewer.entities.add({
          id: asset.id,
          name: asset.name,
          position: Cesium.Cartesian3.fromDegrees(
            asset.longitude,
            asset.latitude,
            asset.height || 0
          ),
          billboard: {
            image: "https://cdn-icons-png.flaticon.com/512/684/684908.png",
            scale: 0.08,
            verticalOrigin: Cesium.VerticalOrigin.BOTTOM
          },
          label: {
            text: asset.tag,
            font: "13px sans-serif",
            style: Cesium.LabelStyle.FILL_AND_OUTLINE,
            outlineWidth: 2,
            verticalOrigin: Cesium.VerticalOrigin.TOP,
            pixelOffset: new Cesium.Cartesian2(0, 8),
            distanceDisplayCondition: new Cesium.DistanceDisplayCondition(0, 1200)
          },
          properties: {
            assetId: asset.id,
            tag: asset.tag,
            type: asset.type,
            zone: asset.zone,
            status: asset.status,
            notes: asset.notes
          }
        });
      }
    }

    async function loadScene() {
      try {
        const googleTiles = await Cesium.Cesium3DTileset.fromIonAssetId(2275207);
        viewer.scene.primitives.add(googleTiles);

        // Optional fallback layer, keep off by default
        // const osmBuildings = await Cesium.Cesium3DTileset.fromIonAssetId(96188);
        // viewer.scene.primitives.add(osmBuildings);

        addAssetPins();

        await viewer.camera.flyTo({
          destination: homeView.destination,
          orientation: homeView.orientation,
          duration: 2
        });

        loadingOverlay.classList.add("hidden");
      } catch (error) {
        console.error("Failed to load Sentinel 3D scene:", error);
        loadingOverlay.textContent = "Failed to load 3D scene. Check token / asset access.";
      }
    }

    const handler = new Cesium.ScreenSpaceEventHandler(viewer.scene.canvas);

    handler.setInputAction(function (click) {
      const pickedObject = viewer.scene.pick(click.position);

      if (Cesium.defined(pickedObject) && Cesium.defined(pickedObject.id) && !measureMode) {
        const entity = pickedObject.id;
        const props = entity.properties;

        showAssetInfo({
          name: entity.name,
          tag: props?.tag?.getValue?.() ?? "-",
          type: props?.type?.getValue?.() ?? "-",
          zone: props?.zone?.getValue?.() ?? "-",
          status: props?.status?.getValue?.() ?? "-",
          notes: props?.notes?.getValue?.() ?? "-"
        });

        viewer.flyTo(entity, {
          duration: 1.5,
          offset: new Cesium.HeadingPitchRange(
            0,
            Cesium.Math.toRadians(-30),
            80
          )
        });

        return;
      }

      if (measureMode) {
        const pickedPosition = viewer.scene.pickPosition(click.position);

        if (Cesium.defined(pickedPosition)) {
          measurePoints.push(pickedPosition);

          const pointEntity = viewer.entities.add({
            position: pickedPosition,
            point: {
              pixelSize: 10,
              color: Cesium.Color.RED,
              outlineColor: Cesium.Color.WHITE,
              outlineWidth: 2
            }
          });
          measureEntities.push(pointEntity);

          if (measurePoints.length === 2) {
            const lineEntity = viewer.entities.add({
              polyline: {
                positions: [measurePoints[0], measurePoints[1]],
                width: 3,
                material: Cesium.Color.YELLOW
              }
            });
            measureEntities.push(lineEntity);

            const distance = Cesium.Cartesian3.distance(measurePoints[0], measurePoints[1]);
            measureResult.textContent = "Distance: " + formatDistance(distance);
          }

          if (measurePoints.length > 2) {
            clearMeasurement();
            const firstPoint = viewer.entities.add({
              position: pickedPosition,
              point: {
                pixelSize: 10,
                color: Cesium.Color.RED,
                outlineColor: Cesium.Color.WHITE,
                outlineWidth: 2
              }
            });
            measureEntities.push(firstPoint);
            measurePoints = [pickedPosition];
          }
        }
      } else {
        const pickedPosition = viewer.scene.pickPosition(click.position);
        if (Cesium.defined(pickedPosition)) {
          viewer.camera.flyTo({
            destination: pickedPosition,
            duration: 1.5
          });
        }
      }
    }, Cesium.ScreenSpaceEventType.LEFT_CLICK);

    btnHome.addEventListener("click", function () {
      viewer.camera.flyTo({
        destination: homeView.destination,
        orientation: homeView.orientation,
        duration: 2
      });
    });

    btnMeasure.addEventListener("click", function () {
      measureMode = !measureMode;
      clearMeasurement();
      updateMeasureModeUI();
      if (measureMode) {
        hideAssetInfo();
      }
    });

    btnClearMeasure.addEventListener("click", function () {
      clearMeasurement();
    });

    btnHideInfo.addEventListener("click", function () {
      hideAssetInfo();
    });

    updateMeasureModeUI();
    loadScene();
  </script>
</body>
</html>
